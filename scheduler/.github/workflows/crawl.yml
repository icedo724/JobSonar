name: Weekly Job Crawl

on:
  schedule:
    - cron: "0 1 * * 1"   # 매주 월요일 오전 10시 KST (UTC+9 → UTC 01:00)
  workflow_dispatch:        # 수동 실행 허용

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 이전 실행에서 쌓인 DB 복원 (artifact 활용)
      - name: Restore database
        uses: actions/download-artifact@v4
        with:
          name: jobsonar-db
          path: data/
        continue-on-error: true   # 첫 실행 시 artifact 없어도 진행

      - name: Run crawlers
        run: python -m crawler.run --source all --max-pages 15
        env:
          PYTHONPATH: ${{ github.workspace }}

      # DB 파일을 artifact로 저장 (다음 실행에서 복원)
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobsonar-db
          path: data/jobsonar.db
          retention-days: 90

      # (선택) Streamlit Cloud용 외부 저장소에 push하려면 아래 스텝 활성화
      # - name: Push DB to storage
